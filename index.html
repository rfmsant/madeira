<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Madeira</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Madeira" />
<link rel="apple-touch-icon" href="icon-180.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">

<!-- Leaflet (mapa da Rota da Poncha) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
/* ============================================================
   Cena: dois jovens ao sol forte da Madeira, telemóvel na mão
   entre a levada verde e o oceano. Luz intensa de exterior.
   → Tema CLARO, arejado, fotografia a dominar (base Airbnb).
   Marca: verde-tropical com profundidade (não mint-AI).
   Tab bar: vidro glossy (Instagram novo) — vidro só onde serve.
============================================================ */
:root{
  --bg:        #ffffff;
  --bg-warm:   oklch(0.99 0.004 150);     /* branco com leve calor verde */
  --surface:   #ffffff;
  --raise:     oklch(0.975 0.006 155);    /* superfície elevada subtil */
  --hair:      oklch(0.92 0.008 155);
  --hair-soft: oklch(0.95 0.006 155);
  --ink:       oklch(0.22 0.02 160);      /* quase-preto verde, texto */
  --ink-2:     oklch(0.46 0.02 160);      /* secundário (≥4.5:1) */
  --ink-3:     oklch(0.62 0.018 160);     /* terciário */
  --brand:     oklch(0.58 0.13 156);      /* verde-tropical sólido */
  --brand-d:   oklch(0.50 0.13 156);      /* verde escuro p/ texto sobre claro */
  --brand-pa:  oklch(0.95 0.04 156);      /* verde pastel (fundos tonais) */
  --brand-pa2: oklch(0.90 0.06 156);
  --rui:       oklch(0.55 0.20 295);      /* roxo — utilizador */
  --rita:      oklch(0.62 0.11 184);      /* teal — utilizador */
  --rui-pa:    oklch(0.95 0.05 295);
  --rita-pa:   oklch(0.95 0.04 184);
  --coral:     oklch(0.68 0.17 25);       /* coral p/ "sem cães"/alertas */
  --coral-pa:  oklch(0.95 0.05 25);
  --gold:      oklch(0.80 0.13 78);       /* dourado p/ notas/estrelas */
  --shadow-sm: 0 1px 2px oklch(0.22 0.02 160 / .06), 0 1px 3px oklch(0.22 0.02 160 / .08);
  --shadow:    0 2px 8px oklch(0.22 0.02 160 / .06), 0 8px 24px oklch(0.22 0.02 160 / .08);
  --shadow-lg: 0 12px 40px oklch(0.22 0.02 160 / .16);
  --r-sm:12px; --r:16px; --r-lg:22px; --r-xl:28px;
  --z-nav:100; --z-fab:110; --z-backdrop:200; --z-sheet:210; --z-toast:300;
  --safe-b: env(safe-area-inset-bottom);
  --safe-t: env(safe-area-inset-top);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg-warm);color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overscroll-behavior-y:none;letter-spacing:-.01em}
button{font-family:inherit;letter-spacing:inherit;color:inherit}
.display{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.025em;text-wrap:balance}
.tnum{font-variant-numeric:tabular-nums}

#root{max-width:500px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg-warm)}
.app-scroll{min-height:100vh;padding-bottom:calc(96px + var(--safe-b))}

/* ---------- HEADER ---------- */
.head{padding:calc(16px + var(--safe-t)) 20px 10px;display:flex;align-items:flex-end;
  justify-content:space-between;gap:12px}
.head h1{font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:700;
  letter-spacing:-.03em;margin:0;line-height:1.02}
.head .sub{font-size:13px;color:var(--ink-3);font-weight:500;margin-top:3px}
.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:15px;
  font-weight:700;color:#fff;flex-shrink:0;box-shadow:var(--shadow-sm);cursor:pointer}

.scr{padding:6px 16px 8px;animation:fade .3s ease-out}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeplain{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ---------- TAB BAR (vidro glossy, estilo Instagram novo) ---------- */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;
  display:flex;padding:10px 10px calc(10px + var(--safe-b));z-index:var(--z-nav);
  background:linear-gradient(to top, oklch(1 0 0 / .92), oklch(1 0 0 / .72));
  backdrop-filter:blur(28px) saturate(1.9);-webkit-backdrop-filter:blur(28px) saturate(1.9);
  border-top:.5px solid oklch(1 0 0 / .6);
  box-shadow:0 -1px 0 oklch(0.92 0.008 155 / .8), 0 -8px 32px oklch(0.22 0.02 160 / .06)}
.tabbtn{flex:1;border:none;background:none;color:var(--ink-3);display:flex;flex-direction:column;
  align-items:center;gap:4px;padding:4px 0;cursor:pointer;font-size:10px;font-weight:600;
  transition:color .25s,transform .25s cubic-bezier(.22,1,.36,1)}
.tabbtn svg{width:25px;height:25px;fill:none;stroke:currentColor;stroke-width:1.7;
  stroke-linecap:round;stroke-linejoin:round;transition:stroke-width .2s}
.tabbtn.on{color:var(--brand-d)}
.tabbtn.on svg{stroke-width:2.2}
.tabbtn.on{transform:translateY(-1px)}

/* ---------- CARD / SURFACE ---------- */
.card{background:var(--surface);border:.5px solid var(--hair);border-radius:var(--r-lg);
  box-shadow:var(--shadow-sm);overflow:hidden}
.section-label{font-size:13px;font-weight:600;color:var(--ink-3);margin:14px 4px 8px}

/* ---------- DAY (itinerário) ---------- */
.day{background:var(--surface);border:.5px solid var(--hair);border-radius:var(--r-lg);
  margin-bottom:14px;box-shadow:var(--shadow-sm);overflow:hidden;transition:box-shadow .3s}
.day.open{box-shadow:var(--shadow)}
.day-hd{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;user-select:none}
.day-n{width:46px;height:46px;border-radius:14px;background:var(--brand-pa);
  display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.day-n .n{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:700;
  color:var(--brand-d);line-height:1}
.day-n .mo{font-size:8px;font-weight:700;color:var(--brand-d);text-transform:uppercase;
  letter-spacing:.06em;margin-top:1px;opacity:.8}
.day-meta{flex:1;min-width:0}
.day-meta .dt{font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.01em}
.day-meta .ti{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:600;
  margin-top:1px;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-right{display:flex;align-items:center;gap:11px;flex-shrink:0}
.ringwrap{position:relative;width:32px;height:32px}
.ringwrap .f{position:absolute;inset:0;display:grid;place-items:center;font-size:10px;font-weight:700;
  color:var(--brand-d)}
.chev{color:var(--ink-3);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.chev.up{transform:rotate(180deg)}
.day-body{padding:2px 16px 8px;animation:fadeplain .3s}

/* ---------- STOP ---------- */
.stop{display:flex;gap:13px;padding:14px 0;align-items:flex-start;border-top:.5px solid var(--hair-soft)}
.stop:first-child{border-top:none}
.tick{width:26px;height:26px;border-radius:9px;border:2px solid var(--hair);flex-shrink:0;
  margin-top:1px;display:grid;place-items:center;cursor:pointer;background:var(--surface);
  transition:all .25s cubic-bezier(.22,1,.36,1)}
.tick.on{background:var(--brand);border-color:var(--brand);transform:scale(1.05)}
.tick svg{stroke:#fff;stroke-width:3;opacity:0;transition:opacity .2s}
.tick.on svg{opacity:1}
.s-main{flex:1;min-width:0}
.s-time{font-size:11px;font-weight:700;color:var(--brand-d);letter-spacing:.02em}
.s-name{font-size:15.5px;font-weight:600;line-height:1.3;margin-top:1px;letter-spacing:-.015em}
.s-name.done{color:var(--ink-3);text-decoration:line-through;text-decoration-color:var(--ink-3)}
.s-desc{font-size:13px;color:var(--ink-2);line-height:1.45;margin-top:4px}
.s-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;align-items:center}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px;line-height:1.25}
.tag.type{background:var(--raise);color:var(--ink-2)}
.tag.pet{background:var(--brand-pa);color:var(--brand-d)}
.tag.nopet{background:var(--coral-pa);color:var(--coral)}
.tag.by{background:transparent;color:var(--ink-3);padding-left:0}
.flight{background:linear-gradient(100deg,var(--brand-pa),transparent);border-radius:14px;
  padding:13px;margin:2px 0}
.flight-ic{width:26px;height:26px;flex-shrink:0;margin-top:1px;color:var(--brand-d)}

/* foto de referência + ações */
.ref-photo{width:100%;height:150px;border-radius:14px;object-fit:cover;margin-top:11px;
  background:var(--raise);box-shadow:var(--shadow-sm)}
.ref-row{display:flex;gap:8px;margin-top:9px}
.link-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--raise);border:.5px solid var(--hair);border-radius:11px;padding:9px;
  font-size:13px;font-weight:600;color:var(--ink);text-decoration:none;cursor:pointer;
  transition:background .2s}
.link-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8}
.link-btn:active{background:var(--brand-pa)}

/* fotos do utilizador */
.shots{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.shot{position:relative;width:60px;height:60px;border-radius:13px;overflow:hidden;
  box-shadow:var(--shadow-sm);cursor:pointer}
.shot img{width:100%;height:100%;object-fit:cover;display:block}
.shot .bar{position:absolute;inset:auto 0 0 0;height:16px;
  background:linear-gradient(transparent,oklch(0 0 0 / .55))}
.add-shot{width:60px;height:60px;border-radius:13px;border:1.5px dashed var(--brand);
  background:var(--brand-pa);display:grid;place-items:center;color:var(--brand-d);cursor:pointer;
  transition:transform .15s}
.add-shot svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.2;fill:none}
.add-shot:active{transform:scale(.94)}

/* ---------- BUTTONS ---------- */
.btn{border:none;border-radius:14px;padding:14px 18px;font-weight:700;font-size:15px;cursor:pointer;
  background:var(--brand);color:#fff;width:100%;transition:transform .12s,filter .2s;
  letter-spacing:-.01em;box-shadow:0 2px 10px oklch(0.58 0.13 156 / .28)}
.btn:active{transform:scale(.985);filter:brightness(1.04)}
.btn.soft{background:var(--brand-pa);color:var(--brand-d);box-shadow:none}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--hair);box-shadow:none}
.btn.coral{background:var(--coral-pa);color:var(--coral);box-shadow:none}
.btn.sm{width:auto;padding:10px 16px;font-size:14px;border-radius:12px}
.foot-actions{display:flex;gap:8px;padding:8px 0 14px}

/* ---------- INPUTS ---------- */
input,textarea,select{font-family:inherit;background:var(--bg-warm);border:1.5px solid var(--hair);
  color:var(--ink);border-radius:13px;padding:13px;width:100%;font-size:16px;outline:none;
  transition:border-color .2s;letter-spacing:-.01em}
input:focus,textarea:focus,select:focus{border-color:var(--brand)}
input::placeholder,textarea::placeholder{color:var(--ink-3)}
textarea{resize:vertical;min-height:56px;line-height:1.45}
.fld{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin:15px 0 6px}
.toggle{display:flex;gap:8px}
.toggle button{flex:1;border:1.5px solid var(--hair);background:var(--surface);border-radius:12px;
  padding:12px;font-weight:600;font-size:14px;cursor:pointer;color:var(--ink-2);transition:all .2s}
.toggle button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ---------- FEED ---------- */
.post{background:var(--surface);border:.5px solid var(--hair);border-radius:var(--r-lg);
  overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.p-hd{display:flex;align-items:center;gap:11px;padding:13px 14px}
.p-hd .nm{font-size:14.5px;font-weight:700}
.p-hd .tm{font-size:11.5px;color:var(--ink-3);font-weight:500;margin-top:1px}
.p-img{width:100%;display:block;max-height:480px;object-fit:cover}
.p-act{display:flex;gap:4px;padding:11px 10px 2px}
.act{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;
  font-size:14px;font-weight:600;color:var(--ink-2);padding:6px 9px;border-radius:10px;
  transition:transform .15s}
.act svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8}
.act:active{transform:scale(.88)}
.act.liked{color:var(--coral)}
.act.liked svg{fill:var(--coral);stroke:var(--coral)}
.p-cap{font-size:14.5px;padding:3px 14px 2px;line-height:1.45}
.p-cap .nm{font-weight:700}
.p-cmts{padding:5px 14px 0}
.p-cmt{font-size:13.5px;margin:5px 0;line-height:1.4}
.p-cmt .nm{font-weight:700}
.p-cmtbar{display:flex;gap:8px;padding:11px 12px 13px}
.p-cmtbar input{padding:11px 13px;font-size:14px}

/* ---------- SABORES / segmented ---------- */
.seg{display:flex;background:var(--raise);border-radius:13px;padding:4px;margin-bottom:14px;gap:3px}
.seg button{flex:1;border:none;background:none;color:var(--ink-2);font-weight:600;font-size:13px;
  padding:9px;border-radius:10px;cursor:pointer;transition:all .25s}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
.f-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-top:.5px solid var(--hair-soft)}
.f-item:first-child{border-top:none}
.f-info{flex:1;min-width:0}
.f-name{font-size:15px;font-weight:600;line-height:1.25;letter-spacing:-.015em}
.f-cat{font-size:11px;color:var(--ink-3);font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;margin-top:3px}
.f-badge{font-size:10px;color:var(--brand-d);font-weight:700;margin-left:6px;
  background:var(--brand-pa);padding:1px 6px;border-radius:6px;vertical-align:1px}
.scores{display:flex;gap:8px;flex-shrink:0;align-items:center;height:46px}
/* quadrado perfeito */
.sq{width:46px;height:46px;flex:0 0 46px;border-radius:13px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border:1.5px solid var(--hair);transition:all .2s;
  overflow:hidden;box-sizing:border-box}
.sq.you{cursor:pointer}
.sq.you.vempty.rui{border:1.5px dashed var(--rui);background:var(--rui-pa)}
.sq.you.vempty.rita{border:1.5px dashed var(--rita);background:var(--rita-pa)}
.sq.vfill.rui{background:var(--rui);border-color:transparent}
.sq.vfill.rita{background:var(--rita);border-color:transparent}
.sq .v{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;line-height:1}
.sq .l{font-size:8px;font-weight:700;margin-top:2px;line-height:1}
.sq.vfill .v,.sq.vfill .l{color:#fff}
.sq.vempty .v{color:var(--ink-3)}.sq.vempty .l{color:var(--ink-3)}
.sq.you.vempty.rui .v{color:var(--rui)}.sq.you.vempty.rita .v{color:var(--rita)}

/* ---------- ROTA DA PONCHA ---------- */
.poncha-map{height:300px;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);
  margin-bottom:12px;border:.5px solid var(--hair);position:relative;z-index:0}
.map-toggle{position:absolute;top:12px;right:12px;z-index:500;display:flex;gap:0;
  background:oklch(1 0 0 / .9);backdrop-filter:blur(12px);border-radius:11px;padding:3px;
  box-shadow:var(--shadow);border:.5px solid var(--hair)}
.map-toggle button{border:none;background:none;font-size:11px;font-weight:700;padding:7px 11px;
  border-radius:9px;cursor:pointer;color:var(--ink-2);transition:all .2s}
.map-toggle button.on{background:var(--brand);color:#fff}
.poncha-stat{display:flex;gap:10px;align-items:center;padding:0 4px;margin-bottom:12px}
.poncha-stat .pct{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:700;
  color:var(--brand-d);line-height:1}
.poncha-stat .lbl{font-size:13px;color:var(--ink-2);font-weight:500}
.poncha-stat .bar{flex:1;height:7px;background:var(--raise);border-radius:7px;overflow:hidden;
  margin-top:6px}
.poncha-stat .bar > span{display:block;height:100%;background:var(--brand);border-radius:7px;
  transition:width .5s cubic-bezier(.22,1,.36,1)}
.bar-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-top:.5px solid var(--hair-soft);
  scroll-margin-top:120px}
.bar-item:first-child{border-top:none}
.bar-item.active{background:var(--brand-pa)}
.bar-info{flex:1;min-width:0}
.bar-name{font-size:15px;font-weight:600;letter-spacing:-.015em;display:flex;align-items:center;gap:7px}
.bar-zona{font-size:11.5px;color:var(--ink-3);font-weight:500;margin-top:2px}
.bar-rating{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;
  color:var(--gold);background:oklch(0.80 0.13 78 / .14);padding:2px 7px;border-radius:7px}
.bar-tip{font-size:12.5px;color:var(--ink-2);line-height:1.4;margin-top:6px}
.bar-actions{display:flex;gap:7px;margin-top:9px}
.bar-mini{display:inline-flex;align-items:center;gap:5px;background:var(--raise);
  border:.5px solid var(--hair);border-radius:9px;padding:6px 11px;font-size:12px;font-weight:600;
  color:var(--ink);text-decoration:none;cursor:pointer}
.bar-mini svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.9}
.bar-tick{width:25px;height:25px;border-radius:8px;border:2px solid var(--hair);flex-shrink:0;
  display:grid;place-items:center;cursor:pointer;background:var(--surface);transition:all .25s}
.bar-tick.on{background:var(--brand);border-color:var(--brand)}
.bar-tick svg{stroke:#fff;stroke-width:3;opacity:0;transition:opacity .2s}
.bar-tick.on svg{opacity:1}

/* ---------- MONTAGEM ---------- */
.cinema{background:#000;border-radius:var(--r-lg);overflow:hidden;position:relative;
  box-shadow:var(--shadow-lg)}
.cinema img{width:100%;height:420px;object-fit:cover;display:block;animation:fadeplain .6s}
.cinema .ov{position:absolute;inset:auto 0 0 0;padding:40px 18px 18px;
  background:linear-gradient(transparent,oklch(0 0 0 / .8))}
.cinema .ov .pl{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:600;
  color:#fff}
.cinema .ov .dy{font-size:12px;color:oklch(1 0 0 / .75);margin-top:2px;font-weight:500}
.strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;margin-top:12px}
.strip img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:11px;cursor:pointer;
  box-shadow:var(--shadow-sm);opacity:.55;transition:all .25s;border:2px solid transparent}
.strip img.cur{opacity:1;border-color:var(--brand)}

/* ---------- SHEET ---------- */
.backdrop{position:fixed;inset:0;background:oklch(0.22 0.02 160 / .4);backdrop-filter:blur(3px);
  z-index:var(--z-backdrop);display:flex;align-items:flex-end;justify-content:center;animation:fadeplain .25s}
.sheet{background:var(--surface);width:100%;max-width:500px;border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:6px 18px calc(22px + var(--safe-b));max-height:92vh;overflow:auto;z-index:var(--z-sheet);
  animation:up .35s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow-lg)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.grab{width:38px;height:5px;background:var(--hair);border-radius:5px;margin:9px auto 16px}
.sheet h3{font-family:'Bricolage Grotesque',sans-serif;font-size:21px;font-weight:700;
  margin:0 0 3px;letter-spacing:-.02em}

/* ---------- LIGHTBOX ---------- */
.lightbox{position:fixed;inset:0;background:oklch(0.15 0.01 160 / .96);z-index:var(--z-toast);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
  animation:fadeplain .2s}
.lightbox img{max-width:100%;max-height:66vh;border-radius:16px;object-fit:contain}
.lb-cap{color:#fff;margin-top:16px;font-size:14.5px;text-align:center;max-width:90%;line-height:1.45}
.lb-acts{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap;justify-content:center}

/* ---------- misc ---------- */
.empty{text-align:center;color:var(--ink-3);padding:56px 24px;font-size:14.5px;line-height:1.6}
.empty svg{width:40px;height:40px;stroke:var(--brand);fill:none;stroke-width:1.5;margin-bottom:14px;opacity:.6}
.center{text-align:center}
.muted{color:var(--ink-3);font-size:12px}
.bignum{font-family:'Bricolage Grotesque',sans-serif;font-size:56px;font-weight:700;text-align:center;
  line-height:1;letter-spacing:-.04em}
.load{position:fixed;inset:0;display:grid;place-items:center;z-index:var(--z-toast);background:var(--bg-warm)}
.spin{width:34px;height:34px;border:3px solid var(--brand-pa2);border-top-color:var(--brand);
  border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(108px + var(--safe-b));left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:100px;font-size:13.5px;
  font-weight:700;z-index:var(--z-toast);animation:tin .3s cubic-bezier(.22,1,.36,1);
  box-shadow:var(--shadow-lg)}
@keyframes tin{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
.banner{margin:0 16px 14px;background:var(--brand-pa);border-radius:15px;padding:14px 15px;
  display:flex;align-items:center;gap:12px}
.banner .t{flex:1;font-size:13px;font-weight:600;line-height:1.4;color:var(--brand-d)}
.banner .x{background:none;border:none;color:var(--brand-d);font-size:19px;cursor:pointer;padding:2px 6px}

/* leaflet pin custom */
.pin{width:24px;height:24px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  border:2.5px solid #fff;box-shadow:0 2px 6px oklch(0 0 0 / .3);cursor:pointer}
.leaflet-popup-content-wrapper{border-radius:13px;box-shadow:var(--shadow-lg)}
.leaflet-popup-content{margin:11px 14px;font-family:'Inter',sans-serif}
.popup-name{font-weight:700;font-size:14px;letter-spacing:-.01em}
.popup-zona{font-size:11.5px;color:#777;margin-top:2px}
.popup-votes{display:flex;gap:6px;margin-top:8px}
.popup-v{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px}
</style>
</head>
<body>
<div id="root"><div class="load"><div class="spin"></div></div></div>
<!-- a app é injetada pelo script abaixo -->
<script src="app.js" type="module"></script>
</body>
</html>
