<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Madeira · diário 🌺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
/* ============================================================
   PALETA "ilha vulcânica" — fuga ao dark-SaaS genérico.
   Fundo papel quente, basalto p/ tinta, coral-hibisco + verde-levada
   + dourado-poncha como acentos. OKLCH.
============================================================ */
:root{
  --paper:    oklch(0.967 0.014 78);    /* creme-papel quente */
  --paper2:   oklch(0.945 0.018 74);    /* sombra do papel */
  --basalt:   oklch(0.205 0.018 256);   /* quase-preto vulcânico (tinta) */
  --basalt-soft: oklch(0.205 0.018 256 / .62);
  --coral:    oklch(0.64 0.18 12);      /* hibisco / magenta-coral */
  --coral-d:  oklch(0.55 0.17 12);
  --levada:   oklch(0.58 0.10 165);     /* verde-levada */
  --levada-d: oklch(0.48 0.10 165);
  --poncha:   oklch(0.80 0.14 78);      /* dourado-poncha */
  --ocean:    oklch(0.52 0.09 230);     /* azul-atlântico */
  --line:     oklch(0.205 0.018 256 / .14);
  --line2:    oklch(0.205 0.018 256 / .08);
  --card:     oklch(0.985 0.008 78);    /* papel mais claro p/ superfícies */
  --shadow:   0 1px 2px oklch(0.205 0.018 256 / .06), 0 8px 24px oklch(0.205 0.018 256 / .10);
  --shadow-lg:0 12px 40px oklch(0.205 0.018 256 / .18);
  --z-sticky:100; --z-backdrop:200; --z-sheet:210; --z-toast:300;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--paper);color:var(--basalt);
  font-family:'Outfit',system-ui,sans-serif;overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased}
button{font-family:inherit}
#root{max-width:520px;margin:0 auto;min-height:100vh;position:relative;
  padding-bottom:92px;
  background:
    radial-gradient(1200px 380px at 110% -8%, oklch(0.64 0.18 12 / .07), transparent 60%),
    radial-gradient(900px 320px at -10% 4%, oklch(0.58 0.10 165 / .06), transparent 55%);
}

.serif{font-family:'Fraunces',serif}
.scr{padding:14px 16px 8px;animation:rise .5s cubic-bezier(.16,1,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- HEADER ---------- */
.hdr{padding:18px 18px 10px;position:relative}
.hdr .kick{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--coral-d);display:flex;align-items:center;gap:7px}
.hdr h1{font-family:'Fraunces',serif;font-size:30px;line-height:1;margin:5px 0 0;
  font-weight:600;letter-spacing:-.02em}
.hdr .meta{font-size:13px;color:var(--basalt-soft);margin-top:6px;font-weight:500}
.whochip{position:absolute;top:18px;right:16px;display:flex;align-items:center;gap:7px;
  background:var(--card);border:1px solid var(--line);padding:6px 11px 6px 7px;
  border-radius:30px;font-size:13px;font-weight:700;box-shadow:var(--shadow)}
.whochip .av{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:12px}

/* ---------- TABS ---------- */
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  background:oklch(0.967 0.014 78 / .82);backdrop-filter:blur(20px) saturate(1.4);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:9px 6px calc(9px + env(safe-area-inset-bottom));z-index:var(--z-sticky)}
.tab{flex:1;border:none;background:none;color:var(--basalt-soft);font-size:10.5px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px;cursor:pointer;
  position:relative;transition:color .25s}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;transition:transform .3s cubic-bezier(.16,1,.3,1)}
.tab.on{color:var(--coral)}
.tab.on svg{transform:translateY(-2px) scale(1.08)}
.tab.on::after{content:'';position:absolute;bottom:-9px;width:18px;height:3px;border-radius:3px;
  background:var(--coral)}

/* ---------- DAY (página de diário) ---------- */
.day{background:var(--card);border:1px solid var(--line);border-radius:20px;
  margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.day::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0} /* sem side-stripe */
.dayhd{padding:15px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;
  position:relative}
.daynum{font-family:'Fraunces',serif;font-size:40px;line-height:.8;font-weight:600;
  color:var(--paper2);-webkit-text-stroke:1.5px var(--coral);flex-shrink:0;width:46px}
.dayinfo{flex:1;min-width:0}
.dayinfo .dt{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--coral-d)}
.dayinfo .tt{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin-top:2px;
  letter-spacing:-.01em;line-height:1.1}
.daycount{text-align:right;flex-shrink:0}
.daycount .frac{font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
.daycount .chev{color:var(--basalt-soft);font-size:11px;margin-top:3px;transition:transform .3s}
.daycount .chev.open{transform:rotate(180deg)}
.pbar{height:5px;background:var(--paper2);margin:0 16px;border-radius:6px;overflow:hidden}
.pbar > span{display:block;height:100%;border-radius:6px;
  background:linear-gradient(90deg,var(--coral),var(--poncha));transition:width .5s cubic-bezier(.16,1,.3,1)}
.daybody{padding:6px 16px 14px}

/* ---------- STOP (paragem) ---------- */
.stop{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line2);
  align-items:flex-start}
.stop:last-child{border-bottom:none}
.tick{width:25px;height:25px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;
  margin-top:2px;display:grid;place-items:center;cursor:pointer;background:transparent;
  transition:all .25s cubic-bezier(.16,1,.3,1)}
.tick.on{background:var(--levada);border-color:var(--levada);transform:scale(1.04)}
.tick svg{stroke:var(--paper);stroke-width:3.5;opacity:0;transition:opacity .2s}
.tick.on svg{opacity:1}
.stmain{flex:1;min-width:0}
.sttime{font-size:11px;font-weight:800;color:var(--ocean);font-variant-numeric:tabular-nums;
  letter-spacing:.02em}
.stname{font-weight:600;font-size:15px;line-height:1.25;margin-top:1px}
.stname.done{text-decoration:line-through;text-decoration-color:var(--basalt-soft);
  color:var(--basalt-soft)}
.stdesc{font-size:12.5px;color:var(--basalt-soft);margin-top:4px;line-height:1.4}
.sttags{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;align-items:center}
.chip{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;
  display:inline-flex;align-items:center;gap:4px;line-height:1}
.chip.type{background:var(--paper2);color:var(--basalt-soft)}
.chip.pet{background:oklch(0.58 0.10 165 / .15);color:var(--levada-d)}
.chip.nopet{background:oklch(0.64 0.18 12 / .12);color:var(--coral-d)}
.chip.doneby{background:transparent;color:var(--basalt-soft);font-weight:600}
.flight{background:linear-gradient(105deg, oklch(0.52 0.09 230 / .10), oklch(0.80 0.14 78 / .08));
  border-radius:14px;padding:12px;margin:4px 0;border:1px dashed oklch(0.52 0.09 230 / .4)}
.flight .stname{font-family:'Fraunces',serif}

/* fotos na paragem */
.thumbs{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.thumb{position:relative;width:58px;height:58px;border-radius:11px;overflow:hidden;
  border:1px solid var(--line);cursor:pointer;box-shadow:var(--shadow)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .cd{position:absolute;inset:auto 0 0 0;font-size:8px;background:oklch(0.205 0.018 256 / .6);
  color:#fff;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.addph{width:58px;height:58px;border-radius:11px;border:1.5px dashed var(--line);
  background:transparent;display:grid;place-items:center;color:var(--coral);cursor:pointer;
  font-size:20px;transition:all .2s}
.addph:active{transform:scale(.94);background:var(--paper2)}

/* ---------- BOTÕES ---------- */
.btn{border:none;border-radius:13px;padding:13px 16px;font-weight:700;font-size:14.5px;
  cursor:pointer;background:var(--coral);color:#fff;width:100%;
  box-shadow:0 2px 8px oklch(0.64 0.18 12 / .25);transition:transform .15s,box-shadow .2s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:transparent;color:var(--basalt);border:1.5px solid var(--line);box-shadow:none}
.btn.lev{background:var(--levada);box-shadow:0 2px 8px oklch(0.58 0.10 165 / .25)}
.btn.gold{background:var(--poncha);color:var(--basalt);box-shadow:0 2px 8px oklch(0.80 0.14 78 / .3)}
.btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:11px}
.addrow{display:flex;gap:8px;margin-top:12px}

/* ---------- INPUTS ---------- */
input,textarea,select{font-family:inherit;background:var(--paper);border:1.5px solid var(--line);
  color:var(--basalt);border-radius:12px;padding:12px;width:100%;font-size:15px;outline:none;
  transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--coral)}
input::placeholder,textarea::placeholder{color:var(--basalt-soft)}
textarea{resize:vertical;min-height:56px}
label.fld{display:block;font-size:12px;font-weight:700;color:var(--basalt-soft);
  margin:12px 0 6px;letter-spacing:.02em}
.toggle{display:flex;gap:8px}
.toggle button{flex:1;border:1.5px solid var(--line);background:transparent;border-radius:11px;
  padding:11px;font-weight:700;font-size:13px;cursor:pointer;color:var(--basalt-soft);
  transition:all .2s}
.toggle button.on{background:var(--basalt);color:var(--paper);border-color:var(--basalt)}

/* ---------- FEED ---------- */
.post{background:var(--card);border:1px solid var(--line);border-radius:20px;
  margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden}
.posthd{display:flex;align-items:center;gap:10px;padding:13px 14px 11px}
.av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:15px;
  flex-shrink:0;box-shadow:var(--shadow)}
.posthd .nm{font-weight:700;font-size:14.5px}
.posthd .tm{font-size:11.5px;color:var(--basalt-soft);font-weight:500}
.post .ph{width:100%;display:block;max-height:480px;object-fit:cover}
.postact{display:flex;gap:6px;align-items:center;padding:11px 12px 4px}
.iconbtn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;
  font-weight:700;font-size:14px;color:var(--basalt-soft);padding:6px 8px;border-radius:10px;
  transition:all .2s}
.iconbtn.liked{color:var(--coral)}
.iconbtn:active{transform:scale(.9)}
.heart{font-size:19px;transition:transform .3s cubic-bezier(.16,1,.3,1)}
.iconbtn.liked .heart{transform:scale(1.15)}
.cap{font-size:14.5px;padding:4px 14px 2px;line-height:1.45}
.cap .nm{font-weight:700}
.cmts{padding:4px 14px 0}
.cmt{font-size:13.5px;margin:5px 0;line-height:1.4}
.cmt .nm{font-weight:700}
.cmtbar{display:flex;gap:8px;padding:11px 12px 13px}
.cmtbar input{padding:10px 12px}

/* ---------- SABORES ---------- */
.hero-food{background:linear-gradient(120deg, oklch(0.80 0.14 78 / .16), oklch(0.64 0.18 12 / .10));
  border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px;
  text-align:center}
.hero-food .t{font-family:'Fraunces',serif;font-size:22px;font-weight:600}
.hero-food .s{font-size:13px;color:var(--basalt-soft);margin-top:4px}
.hero-food .meter{height:8px;background:var(--paper2);border-radius:8px;overflow:hidden;
  margin-top:12px}
.hero-food .meter > span{display:block;height:100%;background:linear-gradient(90deg,var(--poncha),var(--coral));
  border-radius:8px;transition:width .6s cubic-bezier(.16,1,.3,1)}

.seg{display:flex;background:var(--paper2);border-radius:13px;padding:4px;margin-bottom:14px;gap:3px}
.seg button{flex:1;border:none;background:none;color:var(--basalt-soft);font-weight:700;
  font-size:12.5px;padding:9px;border-radius:10px;cursor:pointer;transition:all .25s}
.seg button.on{background:var(--card);color:var(--basalt);box-shadow:var(--shadow)}

.foodcard{background:var(--card);border:1px solid var(--line);border-radius:18px;
  box-shadow:var(--shadow);overflow:hidden}
.food{display:flex;align-items:center;gap:12px;padding:13px 14px;
  border-bottom:1px solid var(--line2)}
.food:last-child{border-bottom:none}
.food .fn{flex:1;min-width:0}
.food .fnm{font-weight:600;font-size:14.5px;line-height:1.2}
.food .fcat{font-size:10px;color:var(--basalt-soft);font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;margin-top:3px}
.food .badge{font-size:9px;color:var(--levada-d);font-weight:700;margin-left:5px}
.vv{display:flex;gap:7px;flex-shrink:0}
.vbox{text-align:center;min-width:46px;border-radius:12px;padding:6px 4px;cursor:default;
  border:1.5px solid var(--line);transition:all .25s;position:relative}
.vbox.you{cursor:pointer}
.vbox.you.empty{border-style:dashed;border-color:var(--coral)}
.vbox.filled{border-color:transparent}
.vbox.filled.r{background:oklch(0.64 0.18 12 / .12)}
.vbox.filled.t{background:oklch(0.58 0.10 165 / .14)}
.vbox .num{font-family:'Fraunces',serif;font-weight:600;font-size:18px;line-height:1}
.vbox .nm{font-size:9px;font-weight:700;color:var(--basalt-soft);margin-top:2px}
.vbox.you.empty .num{color:var(--coral)}

/* ---------- MONTAGEM ---------- */
.cine{background:#000;border-radius:18px;overflow:hidden;position:relative;box-shadow:var(--shadow-lg)}
.cine img{width:100%;height:400px;object-fit:cover;display:block;animation:fade .7s}
.cine .cap{position:absolute;inset:auto 0 0 0;padding:36px 16px 16px;
  background:linear-gradient(transparent, oklch(0.205 0.018 256 / .85));color:#fff}
.cine .cap .pl{font-family:'Fraunces',serif;font-size:19px;font-weight:600}
.cine .cap .dy{font-size:12px;opacity:.8;margin-top:2px}
.filmstrip{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;margin-top:12px}
.filmstrip img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;
  transition:opacity .2s,transform .2s;border:2px solid transparent}
.filmstrip img.cur{border-color:var(--coral);transform:scale(1.03)}

/* ---------- MODAL / SHEET ---------- */
.backdrop{position:fixed;inset:0;background:oklch(0.205 0.018 256 / .5);
  backdrop-filter:blur(4px);z-index:var(--z-backdrop);display:flex;align-items:flex-end;
  justify-content:center;animation:fade .25s}
.sheet{background:var(--paper);width:100%;max-width:520px;border-radius:24px 24px 0 0;
  padding:8px 18px calc(22px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto;
  z-index:var(--z-sheet);animation:slideup .35s cubic-bezier(.16,1,.3,1);box-shadow:var(--shadow-lg)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.grab{width:38px;height:4px;background:var(--line);border-radius:4px;margin:8px auto 14px}
.sheet h3{font-family:'Fraunces',serif;font-size:21px;font-weight:600;margin:0 0 4px}

/* ---------- diversos ---------- */
.empty{text-align:center;color:var(--basalt-soft);padding:48px 24px;font-size:14.5px;
  line-height:1.6}
.empty .ic{font-size:40px;margin-bottom:10px}
.center{text-align:center}
.muted{color:var(--basalt-soft);font-size:12.5px}
.bignum{font-family:'Fraunces',serif;font-size:52px;font-weight:600;text-align:center;
  line-height:1;color:var(--coral)}
.load{position:fixed;inset:0;display:grid;place-items:center;z-index:var(--z-toast);
  background:var(--paper)}
.spin{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--coral);
  border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);background:var(--basalt);
  color:var(--paper);padding:11px 20px;border-radius:30px;font-size:13.5px;font-weight:700;
  z-index:var(--z-toast);box-shadow:var(--shadow-lg);animation:toastin .3s cubic-bezier(.16,1,.3,1)}
@keyframes toastin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
.lightbox{position:fixed;inset:0;background:oklch(0.18 0.015 256 / .94);z-index:var(--z-toast);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
  animation:fade .25s}
.lightbox img{max-width:100%;max-height:72vh;border-radius:14px;object-fit:contain}
.lightbox .lbcap{color:#fff;margin-top:14px;font-size:14px;text-align:center;max-width:90%}
.lightbox .lbact{display:flex;gap:10px;margin-top:16px}
</style>
</head>

const { useState, useEffect, useRef } = React;
const h = React.createElement;

function compress(file, max=1400, q=0.74){
  return new Promise((res)=>{
    const img=new Image(); const rd=new FileReader();
    rd.onload=e=>{img.src=e.target.result};
    img.onload=()=>{
      let w=img.width,ht=img.height;
      if(w>ht&&w>max){ht=ht*max/w;w=max}else if(ht>max){w=w*max/ht;ht=max}
      const c=document.createElement('canvas');c.width=w;c.height=ht;
      c.getContext('2d').drawImage(img,0,0,w,ht);
      c.toBlob(b=>res(b),'image/jpeg',q);
    };
    rd.readAsDataURL(file);
  });
}

function App(){
  const [uid,setUid]=useState(null);
  const [me,setMe]=useState(localStorage.getItem('madeira_me')||null);
  const [tab,setTab]=useState('plano');
  const [days,setDays]=useState(null);
  const [foods,setFoods]=useState(null);
  const [posts,setPosts]=useState([]);
  const [toast,setToast]=useState('');
  const [lightbox,setLightbox]=useState(null);
  const tT=useRef();
  const flash=(m)=>{setToast(m);clearTimeout(tT.current);tT.current=setTimeout(()=>setToast(''),1800)};

  useEffect(()=>{ signInAnonymously(auth).catch(console.error);
    return onAuthStateChanged(auth,u=>{if(u)setUid(u.uid)}); },[]);

  useEffect(()=>{ if(!uid)return;
    const ref=doc(db,'trips',TRIP_ID);
    getDoc(ref).then(s=>{ if(!s.exists())
      setDoc(ref,{days:SEED_DAYS,foods:SEED_FOODS,createdAt:serverTimestamp()}); });
    const u1=onSnapshot(ref,s=>{if(s.exists()){setDays(s.data().days||[]);setFoods(s.data().foods||[])}});
    const u2=onSnapshot(query(collection(db,'trips',TRIP_ID,'posts'),orderBy('ts','desc')),
      s=>setPosts(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2()};
  },[uid]);

  if(!uid||days===null||foods===null)
    return h('div',{className:'load'},h('div',{className:'spin'}));
  if(!me) return h(PickUser,{onPick:k=>{localStorage.setItem('madeira_me',k);setMe(k)}});

  const meU=USERS[me];
  const save=(patch)=>updateDoc(doc(db,'trips',TRIP_ID),patch);

  return h('div',null,
    h(Header,{me:meU}),
    tab==='plano'&&h(Plano,{days,me,save,flash,openLightbox:setLightbox}),
    tab==='feed'&&h(Feed,{posts,me,meU,flash}),

function Plano({days,me,save,flash,openLightbox}){
  const [open,setOpen]=useState(days[0]?.id);
  const [adding,setAdding]=useState(null); // dayIndex

  const toggle=(di,si)=>{ const nd=structuredClone(days);
    const s=nd[di].stops[si]; s.done=!s.done; s.doneBy=s.done?me:null; save({days:nd}); };
  const editTitle=(di)=>{ const t=prompt('Título do dia:',days[di].title);
    if(t!==null){const nd=structuredClone(days);nd[di].title=t;save({days:nd})} };

  return h('div',{className:'scr'},
    days.map((d,di)=>{
      const total=d.stops.length, done=d.stops.filter(s=>s.done).length;
      const pct=total?Math.round(done/total*100):0, isOpen=open===d.id;
      return h('div',{key:d.id,className:'day'},
        h('div',{className:'dayhd',onClick:()=>setOpen(isOpen?null:d.id)},
          h('div',{className:'daynum serif'},di+1),
          h('div',{className:'dayinfo'},
            h('div',{className:'dt'},d.date+' · '+d.label),
            h('div',{className:'tt serif'},d.title)),
          h('div',{className:'daycount'},
            h('div',{className:'frac'},done+'/'+total),
            h('div',{className:'chev'+(isOpen?' open':'')},'▼'))),
        total>0&&h('div',{className:'pbar'},h('span',{style:{width:pct+'%'}})),
        isOpen&&h('div',{className:'daybody'},
          d.stops.length===0&&h('div',{className:'empty',style:{padding:'24px'}},
            h('div',{className:'ic'},'🗺️'),'Dia livre. Adiciona os teus locais.'),
          d.stops.map((s,si)=>h(Stop,{key:s.id,s,di,si,days,me,save,flash,
            onToggle:()=>toggle(di,si),openLightbox})),
          h('div',{className:'addrow'},
            h('button',{className:'btn lev sm',style:{flex:1},
              onClick:()=>setAdding(di)},'+ Adicionar local'),
            h('button',{className:'btn ghost sm',onClick:()=>editTitle(di)},'✏️ Título')))
      );
    }),
    adding!==null&&h(AddStopSheet,{di:adding,days,save,flash,onClose:()=>setAdding(null)})
  );

function Stop({s,di,si,days,me,save,flash,onToggle,openLightbox}){
  const fileRef=useRef();
  const [busy,setBusy]=useState(false);
  const onFiles=async(e)=>{ const files=[...e.target.files]; if(!files.length)return; setBusy(true);
    try{ const nd=structuredClone(days); const st=nd[di].stops[si]; st.photos=st.photos||[];
      for(const f of files){ const blob=await compress(f);
        const path=`trips/${TRIP_ID}/stops/${s.id}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
        const r=sref(storage,path); await uploadBytes(r,blob);
        st.photos.push({url:await getDownloadURL(r),path,by:me,ts:Date.now(),cap:''}); }
      await save({days:nd}); flash('Foto adicionada 📸');
    }catch(err){console.error(err);flash('Erro no upload')} setBusy(false); };

  return h('div',{className:'stop'},
    !s.flight&&h('div',{className:'tick'+(s.done?' on':''),onClick:onToggle},
      h('svg',{viewBox:'0 0 24 24',width:15,height:15,fill:'none'},
        h('path',{d:'M5 13l4 4L19 7'}))),
    s.flight&&h('div',{style:{fontSize:21,flexShrink:0,marginTop:1}},'✈️'),
    h('div',{className:s.flight?'stmain flight':'stmain'},
      s.time&&h('div',{className:'sttime'},s.time),
      h('div',{className:'stname'+(s.done?' done':'')},s.name),
      s.desc&&h('div',{className:'stdesc'},s.desc),
      h('div',{className:'sttags'},
        h('span',{className:'chip type'},s.type),
        s.pet?h('span',{className:'chip pet'},'🐶 pet-friendly')
              :h('span',{className:'chip nopet'},'🚫 sem cães'),
        s.done&&s.doneBy&&h('span',{className:'chip doneby'},'✓ por '+(USERS[s.doneBy]?.name||''))),
      h('div',{className:'thumbs'},
        (s.photos||[]).map((p,i)=>h('div',{key:i,className:'thumb',
          onClick:()=>openLightbox({photo:p,di,si,pi:i})},
          h('img',{src:p.url}),
          p.cap&&h('div',{className:'cd'},p.cap))),
        h('div',{className:'addph',onClick:()=>fileRef.current.click()},busy?'…':'+'),
        h('input',{ref:fileRef,type:'file',accept:'image/*',multiple:true,capture:'environment',
          style:{display:'none'},onChange:onFiles}))
    )
  );
}

/* lightbox p/ ver foto, descrever e eliminar */
function Lightbox({data,me,save,days,onClose,flash}){
  const {photo,di,si,pi}=data;
  const [cap,setCap]=useState(photo.cap||'');
  const [editing,setEditing]=useState(false);
  const saveCap=()=>{ const nd=structuredClone(days);
    nd[di].stops[si].photos[pi].cap=cap.trim(); save({days:nd});
    setEditing(false); flash('Descrição guardada'); };
  const del=async()=>{ if(!confirm('Eliminar esta foto?'))return;
    try{ if(photo.path) await deleteObject(sref(storage,photo.path)).catch(()=>{}); }catch(e){}
    const nd=structuredClone(days); nd[di].stops[si].photos.splice(pi,1);
    await save({days:nd}); flash('Foto eliminada'); onClose(); };
  return h('div',{className:'lightbox',onClick:onClose},
    h('img',{src:photo.url,onClick:e=>e.stopPropagation()}),
    editing
      ? h('div',{style:{width:'100%',maxWidth:420,marginTop:14},onClick:e=>e.stopPropagation()},
          h('textarea',{value:cap,onChange:e=>setCap(e.target.value),autoFocus:true,

            style:{background:'oklch(0.28 0.02 256)',color:'#fff',borderColor:'transparent'}}),
          h('button',{className:'btn',style:{marginTop:8},onClick:saveCap},'Guardar'))
      : h('div',{className:'lbcap',onClick:e=>e.stopPropagation()},
          photo.cap||h('span',{style:{opacity:.6}},'Sem descrição')),
    !editing&&h('div',{className:'lbact',onClick:e=>e.stopPropagation()},
      h('button',{className:'btn gold sm',onClick:()=>setEditing(true)},'✏️ Descrever'),
      h('button',{className:'btn sm',style:{background:'var(--coral)'},onClick:del},'🗑️ Eliminar'),
      h('button',{className:'btn ghost sm',style:{color:'#fff',borderColor:'rgba(255,255,255,.3)'},
        onClick:onClose},'Fechar'))
  );
}

function Feed({posts,me,meU,flash}){
  const fileRef=useRef();
  const [cap,setCap]=useState('');
  const [pending,setPending]=useState(null);
  const [busy,setBusy]=useState(false);
  const onFile=e=>{const f=e.target.files[0];if(!f)return;
    setPending(URL.createObjectURL(f));fileRef.current._file=f};
  const publish=async()=>{ const f=fileRef.current?._file; if(!f){flash('Escolhe uma foto');return;}
    setBusy(true);
    try{ const blob=await compress(f);
      const path=`trips/${TRIP_ID}/feed/${Date.now()}.jpg`;
      const r=sref(storage,path); await uploadBytes(r,blob);
      await addDoc(collection(db,'trips',TRIP_ID,'posts'),
        {url:await getDownloadURL(r),path,caption:cap,by:me,ts:Date.now(),likes:[],comments:[]});
      setCap('');setPending(null);fileRef.current.value='';fileRef.current._file=null;
      flash('Publicado 🎉');
    }catch(err){console.error(err);flash('Erro')} setBusy(false); };
  const like=p=>{ const has=(p.likes||[]).includes(me);
    updateDoc(doc(db,'trips',TRIP_ID,'posts',p.id),
      {likes:has?p.likes.filter(x=>x!==me):[...(p.likes||[]),me]}); };
  const comment=(p,t)=>{ if(!t.trim())return;
    updateDoc(doc(db,'trips',TRIP_ID,'posts',p.id),
      {comments:[...(p.comments||[]),{by:me,txt:t.trim(),ts:Date.now()}]}); };

  return h('div',{className:'scr'},
    h('div',{className:'post',style:{padding:'13px 14px'}},
      h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
        h('span',{className:'av',style:{background:meU.color}},meU.emoji),
        h('div',{style:{flex:1,fontWeight:600,color:'var(--basalt-soft)',fontSize:14}},
          'Partilha um momento…'),
        h('button',{className:'btn sm',onClick:()=>fileRef.current.click()},'📷 Foto')),
      h('input',{ref:fileRef,type:'file',accept:'image/*',capture:'environment',
        style:{display:'none'},onChange:onFile}),
      pending&&h('div',{style:{marginTop:11}},
        h('img',{src:pending,style:{width:'100%',borderRadius:13,maxHeight:300,
          objectFit:'cover',display:'block'}}),
        h('textarea',{placeholder:'Escreve uma legenda…',value:cap,
          onChange:e=>setCap(e.target.value),style:{marginTop:9}}),
        h('button',{className:'btn',style:{marginTop:8},disabled:busy,onClick:publish},
          busy?'A publicar…':'Publicar momento'))),
    posts.length===0&&h('div',{className:'empty'},
      h('div',{className:'ic'},'📸'),'Ainda sem momentos.',h('br'),'Partilha o primeiro!'),
    posts.map(p=>h(Post,{key:p.id,p,me,like,comment}))
  );
}

      h('span',{className:'av',style:{background:u.color}},u.emoji),
      h('div',{style:{flex:1}},h('div',{className:'nm'},u.name),
        h('div',{className:'tm'},when))),
    h('img',{className:'ph',src:p.url}),
    h('div',{className:'postact'},
      h('button',{className:'iconbtn'+(liked?' liked':''),onClick:()=>like(p)},
        h('span',{className:'heart'},liked?'❤️':'🤍'),(p.likes||[]).length||''),
      h('button',{className:'iconbtn'},'💬 ',(p.comments||[]).length||'')),
    p.caption&&h('div',{className:'cap'},h('span',{className:'nm'},u.name+' '),p.caption),
    (p.comments||[]).length>0&&h('div',{className:'cmts'},
      (p.comments||[]).map((c,i)=>{const cu=USERS[c.by]||{name:'?'};
        return h('div',{key:i,className:'cmt'},h('span',{className:'nm'},cu.name+' '),c.txt)})),
    h('div',{className:'cmtbar'},
      h('input',{placeholder:'Comenta…',value:txt,onChange:e=>setTxt(e.target.value),
        onKeyDown:e=>{if(e.key==='Enter'){comment(p,txt);setTxt('')}}}),
      h('button',{className:'btn sm',onClick:()=>{comment(p,txt);setTxt('')}},'➤'))
  );
}

/* ---------- COMIDA ---------- */
function Comida({foods,me,save}){
  const [filter,setFilter]=useState('todas');
  const [edit,setEdit]=useState(null);
  const cats=[['todas','Tudo'],['bebida','Bebidas'],['prato','Pratos'],['doce','Doces']];
  const list=foods.filter(f=>filter==='todas'||f.cat===filter);
  const setVote=(fid,val)=>{ const nf=structuredClone(foods);
    const f=nf.find(x=>x.id===fid); f.votes=f.votes||{}; f.votes[me]={val,ts:Date.now()};
    save({foods:nf}); };
  const tried=foods.filter(f=>f.votes&&f.votes[me]).length;
  const pct=Math.round(tried/foods.length*100);

  return h('div',{className:'scr'},
    h('div',{className:'hero-food'},
      h('div',{className:'t serif'},'🍴 Sabores da Madeira'),
      h('div',{className:'s'},'Já provaste '+tried+' de '+foods.length+' · votos em tempo real'),
      h('div',{className:'meter'},h('span',{style:{width:pct+'%'}}))),
    h('div',{className:'seg'},cats.map(([k,l])=>
      h('button',{key:k,className:filter===k?'on':'',onClick:()=>setFilter(k)},l))),
    h('div',{className:'foodcard'},
      list.map(f=>h(FoodRow,{key:f.id,f,me,onVote:()=>setEdit(f)}))),
    edit&&h(VoteSheet,{f:edit,me,onClose:()=>setEdit(null),onVote:setVote})
  );
}

function FoodRow({f,me,onVote}){
  const v=f.votes||{};
  const box=uk=>{ const val=v[uk]?.val, isYou=uk===me, has=val!=null;
    const cls='vbox'+(isYou?' you':'')+(has?' filled '+(uk==='rui'?'r':'t'):isYou?' empty':'');
    return h('div',{className:cls,onClick:isYou?onVote:undefined},
      h('div',{className:'num'},has?val:(isYou?'+':'–')),
      h('div',{className:'nm'},USERS[uk].name)); };
  return h('div',{className:'food'},
    h('div',{className:'fn'},
      h('div',{className:'fnm'},f.name,f.novo&&h('span',{className:'badge'},'novo')),
      h('div',{className:'fcat'},f.cat)),
    h('div',{className:'vv'},box('rui'),box('rita'))
  );
}

function VoteSheet({f,me,onClose,onVote}){
  const [val,setVal]=useState(f.votes?.[me]?.val ?? 7);
  const other=me==='rui'?'rita':'rui';
  const ov=f.votes?.[other]?.val;
  return h('div',{className:'backdrop',onClick:onClose},
    h('div',{className:'sheet',onClick:e=>e.stopPropagation()},
      h('div',{className:'grab'}),
      h('h3',null,f.name),
      h('p',{className:'muted',style:{marginTop:0}},
        ov!=null?`${USERS[other].name} deu ${ov}/10`:`${USERS[other].name} ainda não provou`),
      h('div',{className:'bignum'},val),
      h('input',{type:'range',min:0,max:10,step:1,value:val,
        onChange:e=>setVal(+e.target.value),style:{marginTop:10}}),
      h('div',{style:{display:'flex',justifyContent:'space-between'},className:'muted'},
        h('span',null,'0'),h('span',null,'a tua nota'),h('span',null,'10')),
      h('button',{className:'btn gold',style:{marginTop:18},
        onClick:()=>{onVote(f.id,val);onClose()}},'Guardar nota'),
      h('button',{className:'btn ghost',style:{marginTop:8},onClick:onClose},'Cancelar')
    ));
}

/* ---------- MONTAGEM ---------- */
function Video({days,posts}){
  const [playing,setPlaying]=useState(false);
  const [idx,setIdx]=useState(0);
  const all=[];
  days.forEach(d=>d.stops.forEach(s=>(s.photos||[]).forEach(p=>
    all.push({url:p.url,cap:p.cap||s.name,place:s.name,day:d.date,ts:p.ts}))));
  posts.forEach(p=>all.push({url:p.url,cap:p.caption,place:p.caption||'Momento',
    day:new Date(p.ts).toLocaleDateString('pt-PT',{day:'2-digit',month:'short'}),ts:p.ts}));
  all.sort((a,b)=>(a.ts||0)-(b.ts||0));

  useEffect(()=>{ if(!playing||!all.length)return;
    const t=setInterval(()=>setIdx(i=>(i+1)%all.length),1500);
    return ()=>clearInterval(t); },[playing,all.length]);

  return h('div',{className:'scr'},
    h('div',{className:'center',style:{marginBottom:14}},
      h('div',{className:'serif',style:{fontSize:23,fontWeight:600}},'🎬 Montagem'),
      h('div',{className:'muted',style:{marginTop:2}},all.length+' fotos · ordem cronológica')),
    all.length===0
      ? h('div',{className:'empty'},h('div',{className:'ic'},'🎞️'),
          'Adiciona fotos no plano ou no feed',h('br'),'para criares a montagem.')
      : h('div',null,
          h('div',{className:'cine'},
            h('img',{key:idx,src:all[idx].url}),
            h('div',{className:'cap'},
              h('div',{className:'pl serif'},all[idx].cap),
              h('div',{className:'dy'},all[idx].day))),
          h('div',{className:'addrow'},
            h('button',{className:'btn',style:{flex:1},onClick:()=>setPlaying(p=>!p)},
              playing?'⏸ Pausa':'▶ Reproduzir'),
            h('button',{className:'btn ghost sm',
              onClick:()=>setIdx(i=>(i+1)%all.length)},'⏭')),
          h('div',{className:'muted center',style:{marginTop:8}},(idx+1)+' / '+all.length),
          h('div',{className:'filmstrip'},
            all.map((p,i)=>h('img',{key:i,src:p.url,className:i===idx?'cur':'',
              onClick:()=>setIdx(i)}))),
          h('div',{className:'muted center',style:{marginTop:14,padding:'0 24px',fontSize:11.5}},
            '💡 Para guardar como vídeo, usa a gravação de ecrã do telemóvel enquanto o slideshow corre.')
      )
  );
}

/* ---------- TABS ---------- */
function Tabs({tab,setTab}){
  const items=[
    ['plano','Plano','M4 6h16M4 12h16M4 18h10'],
    ['feed','Diário','M3 5.5h18v13H3z M3 15l5-5 4 4 4-4 5 5'],
    ['comida','Sabores','M6 3v7a2 2 0 104 0V3 M8 10v11 M17 3c-1.5 1.5-2 3.5-2 6s2 3 2 3v9'],
    ['video','Montagem','M3 5h18v14H3z M10 9l5 3-5 3z'],
  ];
  return h('div',{className:'tabs'},items.map(([k,l,d])=>
    h('button',{key:k,className:'tab'+(tab===k?' on':''),onClick:()=>setTab(k)},
      h('svg',{viewBox:'0 0 24 24'},h('path',{d})),h('span',null,l))));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
