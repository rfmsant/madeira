<!DOCTYPE html>
<html lang="pt">

<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
/* ============================================================
   Técnico / minimal — linguagem iOS nativa.
   Dark graphite, sem emojis, tipografia Inter calibrada.
   Acentos: roxo-Pantone (Rui) + teal sólido (Rita).
============================================================ */
:root{
  --bg:        #0e0e11;
  --bg-elev:   #16161b;
  --surface:   #1b1b22;
  --surface-2: #212129;
  --hair:      rgba(255,255,255,.08);
  --hair-2:    rgba(255,255,255,.05);
  --ink:       #f2f2f5;
  --ink-2:     #a8a8b3;
  --ink-3:     #6c6c78;
  --rui:       oklch(0.55 0.20 295);   /* roxo Pantone Violet */
  --rui-soft:  oklch(0.55 0.20 295 / .16);
  --rita:      oklch(0.62 0.11 184);   /* teal sólido */
  --rita-soft: oklch(0.62 0.11 184 / .16);
  --accent:    var(--rui);             /* acento da app = cor de quem usa (set em runtime) */
  --accent-soft: var(--rui-soft);
  --ok:        oklch(0.68 0.13 160);
  --radius:    16px;
  --z-nav:100; --z-backdrop:200; --z-sheet:210; --z-toast:300;
  --safe-b: env(safe-area-inset-bottom);
  --safe-t: env(safe-area-inset-top);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overscroll-behavior-y:none;letter-spacing:-.011em}
button{font-family:inherit;letter-spacing:inherit}
.tnum{font-variant-numeric:tabular-nums}

#root{max-width:500px;margin:0 auto;min-height:100vh;position:relative}
.app-scroll{min-height:100vh;padding-bottom:calc(80px + var(--safe-b))}

/* ---------- NAV BAR (large-title iOS) ---------- */
.navbar{padding:calc(14px + var(--safe-t)) 20px 8px;position:relative}
.navbar .eyebrow{font-size:12px;font-weight:600;color:var(--ink-3);letter-spacing:.02em}
.navbar h1{font-size:32px;font-weight:800;margin:2px 0 0;letter-spacing:-.03em;line-height:1.05}
.idchip{position:absolute;top:calc(14px + var(--safe-t));right:18px;display:flex;align-items:center;
  gap:8px;background:var(--surface);border:1px solid var(--hair);border-radius:100px;
  padding:5px 12px 5px 6px;font-size:13px;font-weight:600}
.idchip .mono{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;
  font-size:12px;font-weight:700;color:#fff}

.scr{padding:8px 16px 8px;animation:fadein .28s ease-out}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important}}

/* ---------- TAB BAR ---------- */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;
  background:rgba(14,14,17,.8);backdrop-filter:blur(24px) saturate(1.8);
  -webkit-backdrop-filter:blur(24px) saturate(1.8);
  border-top:.5px solid var(--hair);display:flex;
  padding:8px 8px calc(6px + var(--safe-b));z-index:var(--z-nav)}
.tabbtn{flex:1;border:none;background:none;color:var(--ink-3);display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:5px 0;cursor:pointer;font-size:10px;font-weight:600;
  transition:color .2s}
.tabbtn svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round}
.tabbtn.on{color:var(--accent)}
.tabbtn.on svg{stroke-width:2.1}

/* ---------- LIST / GROUPED (iOS inset grouped) ---------- */
.group{background:var(--surface);border:.5px solid var(--hair);border-radius:var(--radius);
  overflow:hidden;margin-bottom:14px}
.group-hd{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer;
  user-select:none}
.daybadge{width:42px;height:42px;border-radius:11px;background:var(--bg-elev);border:.5px solid var(--hair);
  display:grid;place-items:center;flex-shrink:0}
.daybadge .d{font-size:18px;font-weight:800;line-height:1;letter-spacing:-.02em}
.daybadge .m{font-size:8px;font-weight:700;color:var(--ink-3);text-transform:uppercase;
  letter-spacing:.06em;margin-top:1px}
.dmeta{flex:1;min-width:0}
.dmeta .top{font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.01em}
.dmeta .ttl{font-size:16px;font-weight:700;margin-top:1px;letter-spacing:-.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dcount{display:flex;align-items:center;gap:10px;flex-shrink:0}
.ring{width:30px;height:30px;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .frac{position:absolute;inset:0;display:grid;place-items:center;font-size:9px;font-weight:700}
.chev{color:var(--ink-3);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.chev.open{transform:rotate(90deg)}

.daybody{border-top:.5px solid var(--hair-2)}

/* ---------- ROW (stop) ---------- */
.row{display:flex;gap:13px;padding:13px 16px;align-items:flex-start;position:relative}
.row + .row{border-top:.5px solid var(--hair-2)}
.box{width:24px;height:24px;border-radius:7px;border:1.8px solid var(--ink-3);flex-shrink:0;
  margin-top:1px;display:grid;place-items:center;cursor:pointer;background:transparent;
  transition:all .2s cubic-bezier(.32,.72,0,1)}
.box.on{background:var(--ok);border-color:var(--ok)}
.box svg{stroke:#0e0e11;stroke-width:3;opacity:0;transition:opacity .15s}
.box.on svg{opacity:1}
.rmain{flex:1;min-width:0}
.rtime{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.01em}
.rname{font-size:15px;font-weight:600;line-height:1.3;margin-top:1px}
.rname.done{color:var(--ink-3);text-decoration:line-through;text-decoration-color:var(--ink-3)}
.rdesc{font-size:13px;color:var(--ink-2);line-height:1.4;margin-top:4px}
.rtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.tg{font-size:11px;font-weight:600;padding:3px 8px;border-radius:7px;line-height:1.2;
  background:var(--surface-2);color:var(--ink-2)}
.tg.pet{background:var(--rita-soft);color:oklch(0.72 0.11 184)}
.tg.nopet{background:rgba(255,90,90,.12);color:#ff8585}
.tg.by{background:transparent;color:var(--ink-3);padding-left:0}

.flight-row{background:linear-gradient(100deg, var(--accent-soft), transparent)}
.flight-ic{width:24px;height:24px;flex-shrink:0;margin-top:1px;color:var(--accent)}

/* foto de referência (Wikipedia) */
.refphoto{width:100%;height:128px;border-radius:11px;object-fit:cover;margin-top:10px;
  border:.5px solid var(--hair);background:var(--bg-elev)}
.refrow{display:flex;gap:7px;margin-top:9px}
.linkbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--surface-2);border:.5px solid var(--hair);border-radius:9px;padding:8px;
  font-size:12px;font-weight:600;color:var(--ink);text-decoration:none;cursor:pointer}
.linkbtn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8}
.linkbtn:active{background:var(--surface)}

/* fotos do utilizador */
.shots{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.shot{position:relative;width:56px;height:56px;border-radius:10px;overflow:hidden;
  border:.5px solid var(--hair);cursor:pointer}
.shot img{width:100%;height:100%;object-fit:cover;display:block}
.shot .cc{position:absolute;inset:auto 0 0 0;height:14px;background:linear-gradient(transparent,rgba(0,0,0,.7))}
.addshot{width:56px;height:56px;border-radius:10px;border:1.5px dashed var(--hair);
  background:transparent;display:grid;place-items:center;color:var(--accent);cursor:pointer}
.addshot svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none}
.addshot:active{background:var(--surface-2)}

/* ---------- BUTTONS ---------- */
.btn{border:none;border-radius:13px;padding:14px 16px;font-weight:700;font-size:15px;cursor:pointer;
  background:var(--accent);color:#fff;width:100%;transition:transform .12s,filter .2s;
  letter-spacing:-.01em}
.btn:active{transform:scale(.985);filter:brightness(1.05)}
.btn.tinted{background:var(--accent-soft);color:var(--accent)}
.btn.plain{background:var(--surface-2);color:var(--ink);border:.5px solid var(--hair)}
.btn.danger{background:rgba(255,90,90,.16);color:#ff8585}
.btn.sm{width:auto;padding:10px 16px;font-size:14px;border-radius:11px}
.foot-actions{display:flex;gap:8px;padding:12px 16px 14px}

/* ---------- INPUTS ---------- */
input,textarea,select{font-family:inherit;background:var(--bg-elev);border:.5px solid var(--hair);
  color:var(--ink);border-radius:11px;padding:13px;width:100%;font-size:16px;outline:none;
  transition:border-color .2s;letter-spacing:-.01em}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--ink-3)}
textarea{resize:vertical;min-height:54px;line-height:1.4}
.fldlabel{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin:14px 0 6px}
.seg2{display:flex;gap:8px}
.seg2 button{flex:1;border:.5px solid var(--hair);background:var(--bg-elev);border-radius:10px;
  padding:12px;font-weight:600;font-size:14px;cursor:pointer;color:var(--ink-2);transition:all .2s}
.seg2 button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* ---------- FEED ---------- */
.post{background:var(--surface);border:.5px solid var(--hair);border-radius:var(--radius);
  overflow:hidden;margin-bottom:14px}
.post-hd{display:flex;align-items:center;gap:10px;padding:12px 14px}
.mono{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:14px;
  font-weight:700;color:#fff;flex-shrink:0}
.post-hd .nm{font-size:14px;font-weight:700}
.post-hd .tm{font-size:11px;color:var(--ink-3);font-weight:500;margin-top:1px}
.post .img{width:100%;display:block;max-height:460px;object-fit:cover}
.post-act{display:flex;gap:4px;padding:10px 10px 2px}
.act{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;
  font-size:14px;font-weight:600;color:var(--ink-2);padding:6px 9px;border-radius:9px}
.act svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.8}
.act.on{color:var(--accent)}
.act.on svg{fill:var(--accent);stroke:var(--accent)}
.cap{font-size:14px;padding:3px 14px 2px;line-height:1.45}
.cap .nm{font-weight:700}
.cmts{padding:4px 14px 0}
.cmt{font-size:13px;margin:5px 0;line-height:1.4;color:var(--ink)}
.cmt .nm{font-weight:700}
.cmtbar{display:flex;gap:8px;padding:10px 12px 12px}
.cmtbar input{padding:11px 13px;font-size:14px}

/* ---------- SABORES ---------- */
.statband{display:flex;align-items:center;gap:14px;background:var(--surface);
  border:.5px solid var(--hair);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.statband .big{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
.statband .lbl{font-size:13px;color:var(--ink-2);font-weight:500}
.statband .barwrap{flex:1}
.statband .bar{height:6px;background:var(--bg-elev);border-radius:6px;overflow:hidden;margin-top:8px}
.statband .bar > span{display:block;height:100%;background:var(--accent);border-radius:6px;
  transition:width .5s cubic-bezier(.32,.72,0,1)}

.seg{display:flex;background:var(--bg-elev);border-radius:11px;padding:3px;margin-bottom:14px;
  gap:2px;border:.5px solid var(--hair)}
.seg button{flex:1;border:none;background:none;color:var(--ink-2);font-weight:600;font-size:13px;
  padding:9px;border-radius:8px;cursor:pointer;transition:all .2s}
.seg button.on{background:var(--surface-2);color:var(--ink)}

.fitem{display:flex;align-items:center;gap:12px;padding:13px 16px}
.fitem + .fitem{border-top:.5px solid var(--hair-2)}
.finfo{flex:1;min-width:0}
.fname{font-size:15px;font-weight:600;line-height:1.2}
.fcat{font-size:11px;color:var(--ink-3);font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;margin-top:3px}
.fbadge{font-size:10px;color:var(--accent);font-weight:700;margin-left:6px;vertical-align:1px}
.scores{display:flex;gap:8px;flex-shrink:0;align-items:center}
/* quadrado perfeito */
.sq{width:46px;height:46px;flex:0 0 46px;border-radius:12px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border:1.5px solid var(--hair);position:relative;
  transition:all .2s;overflow:hidden}
.sq.you{cursor:pointer}
.sq.you.empty{border-style:dashed}
.sq.you.empty.rui{border-color:var(--rui)}
.sq.you.empty.rita{border-color:var(--rita)}
.sq.filled.rui{background:var(--rui-soft);border-color:transparent}
.sq.filled.rita{background:var(--rita-soft);border-color:transparent}
.sq .n{font-size:16px;font-weight:800;letter-spacing:-.02em;line-height:1}
.sq .who{font-size:8px;font-weight:700;color:var(--ink-3);margin-top:2px;line-height:1}
.sq.you.empty.rui .n{color:var(--rui)}
.sq.you.empty.rita .n{color:var(--rita)}

/* ---------- MONTAGEM ---------- */
.cinema{background:#000;border-radius:var(--radius);overflow:hidden;position:relative;
  border:.5px solid var(--hair)}
.cinema img{width:100%;height:400px;object-fit:cover;display:block;animation:kfade .6s}
@keyframes kfade{from{opacity:.4}to{opacity:1}}
.cinema .ov{position:absolute;inset:auto 0 0 0;padding:34px 16px 16px;
  background:linear-gradient(transparent,rgba(0,0,0,.82))}
.cinema .ov .pl{font-size:17px;font-weight:700}
.cinema .ov .dy{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px;font-weight:500}
.strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:7px;margin-top:12px}
.strip img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:9px;cursor:pointer;
  border:1.5px solid transparent;opacity:.5;transition:all .2s}
.strip img.cur{border-color:var(--accent);opacity:1}

/* ---------- SHEET ---------- */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);
  z-index:var(--z-backdrop);display:flex;align-items:flex-end;justify-content:center;
  animation:fadein .22s}
.sheet{background:var(--bg-elev);width:100%;max-width:500px;border-radius:22px 22px 0 0;
  padding:6px 18px calc(20px + var(--safe-b));max-height:92vh;overflow:auto;
  z-index:var(--z-sheet);animation:slideup .34s cubic-bezier(.32,.72,0,1);
  border-top:.5px solid var(--hair)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.grab{width:36px;height:5px;background:var(--hair);border-radius:5px;margin:8px auto 16px}
.sheet h3{font-size:20px;font-weight:800;margin:0 0 2px;letter-spacing:-.02em}

/* ---------- LIGHTBOX ---------- */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:var(--z-toast);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
  animation:fadein .2s}
.lightbox img{max-width:100%;max-height:68vh;border-radius:14px;object-fit:contain}
.lbcap{color:#fff;margin-top:14px;font-size:14px;text-align:center;max-width:90%;line-height:1.4}
.lbacts{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap;justify-content:center}

/* ---------- misc ---------- */
.empty{text-align:center;color:var(--ink-3);padding:52px 24px;font-size:14px;line-height:1.6}
.empty svg{width:38px;height:38px;stroke:var(--ink-3);fill:none;stroke-width:1.5;margin-bottom:12px}
.center{text-align:center}
.muted{color:var(--ink-3);font-size:12px}
.section-title{font-size:13px;font-weight:600;color:var(--ink-3);margin:2px 4px 10px;
  letter-spacing:.01em}
.bignum{font-size:54px;font-weight:800;text-align:center;line-height:1;letter-spacing:-.04em}
.load{position:fixed;inset:0;display:grid;place-items:center;z-index:var(--z-toast);background:var(--bg)}
.spin{width:32px;height:32px;border:2.5px solid var(--hair);border-top-color:var(--accent);
  border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(94px + var(--safe-b));left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:100px;font-size:13px;
  font-weight:700;z-index:var(--z-toast);animation:tin .3s cubic-bezier(.32,.72,0,1);
  box-shadow:0 8px 30px rgba(0,0,0,.4)}
@keyframes tin{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
.install-banner{margin:0 16px 14px;background:var(--accent-soft);border:.5px solid var(--accent);
  border-radius:13px;padding:13px 14px;display:flex;align-items:center;gap:12px}
.install-banner .txt{flex:1;font-size:13px;font-weight:600;line-height:1.35}
.install-banner .x{background:none;border:none;color:var(--ink-2);font-size:18px;cursor:pointer;
  padding:2px 6px}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc,
  serverTimestamp, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref as sref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* ============================================================
   1. FIREBASE CONFIG  —  ⚠️ cola aqui os teus valores
============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyA1x2zxsjQ3TY1ALsGjbVBdSo-FXUR6ZfM",
  authDomain: "madeira-viagem.firebaseapp.com",
  projectId: "madeira-viagem",
  storageBucket: "madeira-viagem.firebasestorage.app",
  messagingSenderId: "431424806116",
  appId: "1:431424806116:web:6bd98958982ff052d320f1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const TRIP_ID = "madeira2026";

/* ============================================================
   2. UTILIZADORES — Rui (roxo) · Rita (teal)
============================================================ */
const USERS = {
  rui:  { name:"Rui",  initial:"R", color:"oklch(0.55 0.20 295)" },
  rita: { name:"Rita", initial:"R", color:"oklch(0.62 0.11 184)" },
};
const TYPES = ["passeio","praia","miradouro","levada","comida","experiência","histórico","natureza","noite","base","voo"];

/* parse "HH:MM" -> minutos (para ordenar). Sem hora => fim da lista (99999) */
const toMin = (t)=>{ if(!t) return 99999; const m=/^(\d{1,2}):(\d{2})$/.exec(t.trim());
  return m? (+m[1])*60+(+m[2]) : 99999; };
const sortByTime = (stops)=> [...stops].sort((a,b)=>{
  // voos mantêm posição relativa natural; ordenamos tudo por hora
  return toMin(a.time)-toMin(b.time);
});

/* slug Wikipedia PT para foto de referência */
const wikiTitle = (name)=>{
  // limpa prefixos comuns e sufixos entre parênteses
  let n=name.replace(/\s*\(.*?\)\s*/g,'').replace(/\s*[—–-]\s*.*/,'').trim();
  n=n.replace(/^(Almoço|Jantar|Check-in|Voo)\s*/i,'').trim();
  return encodeURIComponent(n.replace(/\s+/g,'_'));
};
const mapsUrl = (name)=>`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name+' Madeira')}`;
const wazeUrl = (name)=>`https://waze.com/ul?q=${encodeURIComponent(name+' Madeira')}`;

/* ============================================================
   3. SEED  (dias 1-3) — descrições incluídas
============================================================ */
const SEED_DAYS = [

function compress(file, max=1400, q=0.74){
  return new Promise(res=>{ const img=new Image(),rd=new FileReader();
    rd.onload=e=>img.src=e.target.result;
    img.onload=()=>{ let w=img.width,ht=img.height;
      if(w>ht&&w>max){ht=ht*max/w;w=max}else if(ht>max){w=w*max/ht;ht=max}
      const c=document.createElement('canvas');c.width=w;c.height=ht;
      c.getContext('2d').drawImage(img,0,0,w,ht);c.toBlob(b=>res(b),'image/jpeg',q); };
    rd.readAsDataURL(file); });
}

function App(){

  const [posts,setPosts]=useState([]);

  const [lightbox,setLightbox]=useState(null);
  const scrollRef=useRef(null);
  const tT=useRef();
  const flash=(m)=>{setToast(m);clearTimeout(tT.current);tT.current=setTimeout(()=>setToast(''),1700)};

  // acento da app = cor de quem usa
  useEffect(()=>{ if(me){ const c=USERS[me].color;
    document.documentElement.style.setProperty('--accent',c);
    document.documentElement.style.setProperty('--accent-soft',
      me==='rui'?'oklch(0.55 0.20 295 / .16)':'oklch(0.62 0.11 184 / .16)'); } },[me]);

  useEffect(()=>{ if(!uid)return;

    const u1=onSnapshot(ref,s=>{if(s.exists()){setDays(s.data().days||[]);setFoods(s.data().foods||[])}});
    const u2=onSnapshot(query(collection(db,'trips',TRIP_ID,'posts'),orderBy('ts','desc')),
      s=>setPosts(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2()};
  },[uid]);

  // SCROLL-TO-TOP ao trocar de tab (instantâneo, sem animação)
  const changeTab=(t)=>{ setTab(t);
    if(scrollRef.current) scrollRef.current.scrollTop=0;
    window.scrollTo(0,0); };

  if(!uid||days===null||foods===null) return h('div',{className:'load'},h('div',{className:'spin'}));

  );

function InstallBanner({flash}){
  const [show,setShow]=useState(false);
  const [evt,setEvt]=useState(null);
  const [ios,setIos]=useState(false);
  useEffect(()=>{
    if(localStorage.getItem('madeira_installed')||
       window.matchMedia('(display-mode: standalone)').matches) return;
    const isIos=/iphone|ipad|ipod/i.test(navigator.userAgent);
    if(isIos){ setIos(true); setShow(true); return; }
    const handler=(e)=>{ e.preventDefault(); setEvt(e); setShow(true); };
    window.addEventListener('beforeinstallprompt',handler);
    return ()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);
  if(!show) return null;
  const install=async()=>{ if(evt){ evt.prompt(); const r=await evt.userChoice;
    if(r.outcome==='accepted'){localStorage.setItem('madeira_installed','1');setShow(false)} } };
  return h('div',{className:'install-banner'},
    h('div',{style:{color:'var(--accent)'}},h(Icon,{d:ICONS.plus,size:22})),
    h('div',{className:'txt'}, ios
      ? 'Para instalar: toca em Partilhar e depois "Adicionar ao ecrã principal".'
      : 'Instala a app no teu telemóvel para acesso rápido.'),
    !ios&&h('button',{className:'btn sm',onClick:install},'Instalar'),
    h('button',{className:'x',onClick:()=>{setShow(false);localStorage.setItem('madeira_installed','1')}},'×')
  );
}

function Plano({days,me,save,flash,openLightbox}){
  const [open,setOpen]=useState(days[0]?.id);
  const [adding,setAdding]=useState(null);
  const toggle=(di,si)=>{ const nd=structuredClone(days);
    const s=nd[di].stops[si]; s.done=!s.done; s.doneBy=s.done?me:null; save({days:nd}); };
  const editTitle=(di)=>{ const t=prompt('Título do dia:',days[di].title);
    if(t!==null){const nd=structuredClone(days);nd[di].title=t;save({days:nd})} };

  return h('div',{className:'scr'},
    days.map((d,di)=>{
      const total=d.stops.length,done=d.stops.filter(s=>s.done).length;
      const pct=total?done/total:0,isOpen=open===d.id;
      const C=2*Math.PI*12;
      return h('div',{key:d.id,className:'group'},
        h('div',{className:'group-hd',onClick:()=>setOpen(isOpen?null:d.id)},
          h('div',{className:'daybadge'},
            h('div',{className:'d'},di+1),h('div',{className:'m'},d.date.split(' ')[1])),
          h('div',{className:'dmeta'},
            h('div',{className:'top'},d.date+' · '+d.label),
            h('div',{className:'ttl'},d.title)),
          h('div',{className:'dcount'},
            total>0&&h('div',{className:'ring'},
              h('svg',{width:30,height:30},
                h('circle',{cx:15,cy:15,r:12,fill:'none',stroke:'var(--hair)',strokeWidth:2.5}),
                h('circle',{cx:15,cy:15,r:12,fill:'none',stroke:'var(--accent)',strokeWidth:2.5,
                  strokeDasharray:C,strokeDashoffset:C*(1-pct),strokeLinecap:'round'})),
              h('div',{className:'frac tnum'},done)),
            h('div',{className:'chev'+(isOpen?' open':'')},
              h(Icon,{d:'M9 6l6 6-6 6',size:18})))),
        isOpen&&h('div',{className:'daybody'},
          d.stops.length===0&&h('div',{className:'empty',style:{padding:'28px'}},
            h(Icon,{d:ICONS.pin,size:32}),h('div',null,'Dia livre. Adiciona os teus locais.')),
          d.stops.map((s,si)=>h(StopRow,{key:s.id,s,di,si,days,me,save,flash,
            onToggle:()=>toggle(di,si),openLightbox})),
          h('div',{className:'foot-actions'},
            h('button',{className:'btn tinted sm',style:{flex:1},onClick:()=>setAdding(di)},
              '+ Adicionar local'),
            h('button',{className:'btn plain sm',onClick:()=>editTitle(di)},'Editar título')))
      );
    }),
    adding!==null&&h(AddSheet,{di:adding,days,save,flash,onClose:()=>setAdding(null)})
  );
}

function StopRow({s,di,si,days,me,save,flash,onToggle,openLightbox}){
  const fileRef=useRef();
  const [busy,setBusy]=useState(false);
  const [refPhoto,setRefPhoto]=useState(undefined); // undefined=loading, null=none, url=ok
  const [showRef,setShowRef]=useState(false);

  // buscar foto Wikipedia (uma vez, quando expandido pela 1ª vez)
  useEffect(()=>{ if(!showRef||refPhoto!==undefined) return;
    if(s.flight||s.type==='base'||/^(Almoço|Jantar)/.test(s.name)){ setRefPhoto(null); return; }
    const t=wikiTitle(s.name);
    fetch(`https://pt.wikipedia.org/api/rest_v1/page/summary/${t}`)
      .then(r=>r.ok?r.json():null)
      .then(d=>setRefPhoto(d?.thumbnail?.source||null))
      .catch(()=>setRefPhoto(null));
  },[showRef]);

  const onFiles=async(e)=>{ const files=[...e.target.files];if(!files.length)return;setBusy(true);
    try{ const nd=structuredClone(days);const st=nd[di].stops[si];st.photos=st.photos||[];
      for(const f of files){ const blob=await compress(f);
        const path=`trips/${TRIP_ID}/stops/${s.id}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
        const r=sref(storage,path);await uploadBytes(r,blob);
        st.photos.push({url:await getDownloadURL(r),path,by:me,ts:Date.now(),cap:''}); }
      await save({days:nd});flash('Foto adicionada');
    }catch(err){console.error(err);flash('Erro no upload')}setBusy(false); };

  return h('div',{className:s.flight?'row flight-row':'row'},
    !s.flight&&h('div',{className:'box'+(s.done?' on':''),onClick:onToggle},
      h(Icon,{d:ICONS.check,size:15})),
    s.flight&&h('div',{className:'flight-ic'},h(Icon,{d:ICONS.plane,size:22})),
    h('div',{className:'rmain'},
      h('div',{onClick:()=>setShowRef(v=>!v),style:{cursor:'pointer'}},
        s.time&&h('div',{className:'rtime tnum'},s.time),
        h('div',{className:'rname'+(s.done?' done':'')},s.name),
        s.desc&&h('div',{className:'rdesc'},s.desc)),
      h('div',{className:'rtags'},
        h('span',{className:'tg'},s.type),
        !s.flight&&(s.pet?h('span',{className:'tg pet'},'pet-friendly')
              :h('span',{className:'tg nopet'},'sem cães')),
        s.done&&s.doneBy&&h('span',{className:'tg by'},'✓ '+(USERS[s.doneBy]?.name||''))),
      // bloco de referência (foto wiki + mapas/waze) — só quando expandido
      showRef&&!s.flight&&h('div',null,
        refPhoto&&h('img',{className:'refphoto',src:refPhoto,alt:s.name}),
        h('div',{className:'refrow'},
          h('a',{className:'linkbtn',href:mapsUrl(s.name),target:'_blank',rel:'noopener'},
            h(Icon,{d:ICONS.pin,size:14}),'Maps'),
          h('a',{className:'linkbtn',href:wazeUrl(s.name),target:'_blank',rel:'noopener'},
            h(Icon,{d:ICONS.nav,size:14}),'Waze'))),
      // fotos do utilizador
      h('div',{className:'shots'},
        (s.photos||[]).map((p,i)=>h('div',{key:i,className:'shot',
          onClick:()=>openLightbox({photo:p,di,si,pi:i})},
          h('img',{src:p.url}),p.cap&&h('div',{className:'cc'}))),
        h('div',{className:'addshot',onClick:()=>fileRef.current.click()},
          busy?'…':h(Icon,{d:ICONS.plus,size:20})),
        h('input',{ref:fileRef,type:'file',accept:'image/*',multiple:true,capture:'environment',
          style:{display:'none'},onChange:onFiles}))
    )
  );
}

function AddSheet({di,days,save,flash,onClose}){
  const [name,setName]=useState(''),[time,setTime]=useState(''),[type,setType]=useState('passeio'),
    [desc,setDesc]=useState(''),[pet,setPet]=useState(true),[more,setMore]=useState(false);
  const add=()=>{ if(!name.trim()){flash('Falta o nome');return;}
    const nd=structuredClone(days);
    nd[di].stops.push({id:'x'+Date.now(),name:name.trim(),time:time.trim(),type,desc:desc.trim(),pet});
    nd[di].stops=sortByTime(nd[di].stops);   // <-- ordena por hora
    save({days:nd});flash('Local adicionado');onClose(); };
  return h('div',{className:'backdrop',onClick:onClose},
    h('div',{className:'sheet',onClick:e=>e.stopPropagation()},
      h('div',{className:'grab'}),
      h('h3',null,'Novo local'),
      h('p',{className:'muted',style:{marginTop:0,marginBottom:2}},'Dia '+(di+1)+' · '+days[di].date),
      h('label',{className:'fldlabel'},'Nome'),
      h('input',{value:name,onChange:e=>setName(e.target.value),placeholder:'Ex.: Cabo Girão',autoFocus:true}),
      h('label',{className:'fldlabel'},'Tipo'),
      h('select',{value:type,onChange:e=>setType(e.target.value)},
        TYPES.map(t=>h('option',{key:t,value:t},t))),
      h('label',{className:'fldlabel'},'Aceita o Troy?'),
      h('div',{className:'seg2'},
        h('button',{className:pet?'on':'',onClick:()=>setPet(true)},'Pet-friendly'),
        h('button',{className:!pet?'on':'',onClick:()=>setPet(false)},'Sem cães')),
      !more&&h('button',{className:'btn plain sm',style:{width:'100%',marginTop:14},
        onClick:()=>setMore(true)},'Adicionar hora e descrição'),
      more&&h('div',null,
        h('label',{className:'fldlabel'},'Hora (entra na ordem certa)'),
        h('input',{value:time,onChange:e=>setTime(e.target.value),placeholder:'Ex.: 14:30'}),
        h('label',{className:'fldlabel'},'Descrição'),
        h('textarea',{value:desc,onChange:e=>setDesc(e.target.value),placeholder:'Uma nota sobre o local…'})),
      h('button',{className:'btn',style:{marginTop:16},onClick:add},'Adicionar ao dia'),
      h('button',{className:'btn plain',style:{marginTop:8},onClick:onClose},'Cancelar')
    ));
}

function Lightbox({data,me,save,days,onClose,flash}){
  const {photo,di,si,pi}=data;
  const [cap,setCap]=useState(photo.cap||''),[editing,setEditing]=useState(false);
  const saveCap=()=>{ const nd=structuredClone(days);nd[di].stops[si].photos[pi].cap=cap.trim();
    save({days:nd});setEditing(false);flash('Descrição guardada'); };
  const del=async()=>{ if(!confirm('Eliminar esta foto?'))return;
    try{if(photo.path)await deleteObject(sref(storage,photo.path)).catch(()=>{})}catch(e){}
    const nd=structuredClone(days);nd[di].stops[si].photos.splice(pi,1);
    await save({days:nd});flash('Foto eliminada');onClose(); };
  return h('div',{className:'lightbox',onClick:onClose},
    h('img',{src:photo.url,onClick:e=>e.stopPropagation()}),
    editing
      ? h('div',{style:{width:'100%',maxWidth:420,marginTop:14},onClick:e=>e.stopPropagation()},
          h('textarea',{value:cap,onChange:e=>setCap(e.target.value),autoFocus:true,
            placeholder:'Descreve este momento…'}),
          h('button',{className:'btn',style:{marginTop:8},onClick:saveCap},'Guardar'))
      : h('div',{className:'lbcap',onClick:e=>e.stopPropagation()},
          photo.cap||h('span',{style:{opacity:.5}},'Sem descrição')),
    !editing&&h('div',{className:'lbacts',onClick:e=>e.stopPropagation()},
      h('button',{className:'btn plain sm',onClick:()=>setEditing(true)},'Descrever'),
      h('button',{className:'btn danger sm',onClick:del},'Eliminar'),
      h('button',{className:'btn plain sm',onClick:onClose},'Fechar'))
  );
}

/* ---------- FEED ---------- */
function Feed({posts,me,meU,flash}){
  const fileRef=useRef();
  const [cap,setCap]=useState(''),[pending,setPending]=useState(null),[busy,setBusy]=useState(false);
  const onFile=e=>{const f=e.target.files[0];if(!f)return;setPending(URL.createObjectURL(f));fileRef.current._file=f};
  const publish=async()=>{ const f=fileRef.current?._file;if(!f){flash('Escolhe uma foto');return;}setBusy(true);
    try{ const blob=await compress(f);const path=`trips/${TRIP_ID}/feed/${Date.now()}.jpg`;
      const r=sref(storage,path);await uploadBytes(r,blob);
      await addDoc(collection(db,'trips',TRIP_ID,'posts'),
        {url:await getDownloadURL(r),path,caption:cap,by:me,ts:Date.now(),likes:[],comments:[]});
      setCap('');setPending(null);fileRef.current.value='';fileRef.current._file=null;flash('Publicado');
    }catch(err){console.error(err);flash('Erro')}setBusy(false); };
  const like=p=>{const has=(p.likes||[]).includes(me);
    updateDoc(doc(db,'trips',TRIP_ID,'posts',p.id),{likes:has?p.likes.filter(x=>x!==me):[...(p.likes||[]),me]})};
  const comment=(p,t)=>{if(!t.trim())return;
    updateDoc(doc(db,'trips',TRIP_ID,'posts',p.id),{comments:[...(p.comments||[]),{by:me,txt:t.trim(),ts:Date.now()}]})};

  return h('div',{className:'scr'},
    h('div',{className:'post',style:{padding:'12px 14px'}},
      h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
        h('span',{className:'mono',style:{background:meU.color}},meU.initial),
        h('div',{style:{flex:1,fontWeight:500,color:'var(--ink-3)',fontSize:14}},'Partilha um momento…'),
        h('button',{className:'btn sm',onClick:()=>fileRef.current.click(),
          style:{display:'flex',alignItems:'center',gap:6}},h(Icon,{d:ICONS.camera,size:18}),'Foto')),
      h('input',{ref:fileRef,type:'file',accept:'image/*',capture:'environment',
        style:{display:'none'},onChange:onFile}),
      pending&&h('div',{style:{marginTop:11}},
        h('img',{src:pending,style:{width:'100%',borderRadius:12,maxHeight:300,objectFit:'cover',display:'block'}}),
        h('textarea',{placeholder:'Legenda…',value:cap,onChange:e=>setCap(e.target.value),style:{marginTop:9}}),
        h('button',{className:'btn',style:{marginTop:8},disabled:busy,onClick:publish},
          busy?'A publicar…':'Publicar'))),
    posts.length===0&&h('div',{className:'empty'},h(Icon,{d:ICONS.image,size:38}),
      h('div',null,'Ainda sem momentos.')),
    posts.map(p=>h(Post,{key:p.id,p,me,like,comment}))
  );
}

function Post({p,me,like,comment}){
  const u=USERS[p.by]||{name:'?',color:'#666',initial:'?'};
  const [txt,setTxt]=useState('');
  const liked=(p.likes||[]).includes(me);
  const when=new Date(p.ts).toLocaleString('pt-PT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  return h('div',{className:'post'},
    h('div',{className:'post-hd'},
      h('span',{className:'mono',style:{background:u.color}},u.initial),
      h('div',{style:{flex:1}},h('div',{className:'nm'},u.name),h('div',{className:'tm tnum'},when))),
    h('img',{className:'img',src:p.url}),
    h('div',{className:'post-act'},
      h('button',{className:'act'+(liked?' on':''),onClick:()=>like(p)},
        h(Icon,{d:ICONS.heart,size:21,fill:liked?'currentColor':'none'}),
        (p.likes||[]).length||''),
      h('button',{className:'act'},h(Icon,{d:ICONS.comment,size:21}),(p.comments||[]).length||'')),
    p.caption&&h('div',{className:'cap'},h('span',{className:'nm'},u.name+' '),p.caption),
    (p.comments||[]).length>0&&h('div',{className:'cmts'},
      (p.comments||[]).map((c,i)=>{const cu=USERS[c.by]||{name:'?'};
        return h('div',{key:i,className:'cmt'},h('span',{className:'nm'},cu.name+' '),c.txt)})),
    h('div',{className:'cmtbar'},
      h('input',{placeholder:'Comenta…',value:txt,onChange:e=>setTxt(e.target.value),
        onKeyDown:e=>{if(e.key==='Enter'){comment(p,txt);setTxt('')}}}),
      h('button',{className:'btn sm',onClick:()=>{comment(p,txt);setTxt('')},
        style:{display:'grid',placeItems:'center',width:44}},h(Icon,{d:ICONS.send,size:18})))
  );
}

/* ---------- SABORES ---------- */
function Comida({foods,me,save}){
  const [filter,setFilter]=useState('todas'),[edit,setEdit]=useState(null);
  const cats=[['todas','Tudo'],['bebida','Bebidas'],['prato','Pratos'],['doce','Doces']];
  const list=foods.filter(f=>filter==='todas'||f.cat===filter);
  const setVote=(fid,val)=>{const nf=structuredClone(foods);const f=nf.find(x=>x.id===fid);
    f.votes=f.votes||{};f.votes[me]={val,ts:Date.now()};save({foods:nf})};
  const tried=foods.filter(f=>f.votes&&f.votes[me]).length,pct=Math.round(tried/foods.length*100);
  return h('div',{className:'scr'},
    h('div',{className:'statband'},
      h('div',{className:'big tnum'},tried),
      h('div',{className:'barwrap'},
        h('div',{className:'lbl'},'de '+foods.length+' provados · votos em tempo real'),
        h('div',{className:'bar'},h('span',{style:{width:pct+'%'}})))),
    h('div',{className:'seg'},cats.map(([k,l])=>
      h('button',{key:k,className:filter===k?'on':'',onClick:()=>setFilter(k)},l))),
    h('div',{className:'group'},
      list.map(f=>h(FoodItem,{key:f.id,f,me,onVote:()=>setEdit(f)}))),
    edit&&h(VoteSheet,{f:edit,me,onClose:()=>setEdit(null),onVote:setVote})
  );
}

function FoodItem({f,me,onVote}){
  const v=f.votes||{};
  const sq=uk=>{ const val=v[uk]?.val,isYou=uk===me,has=val!=null;
    const cls='sq '+(uk)+(isYou?' you':'')+(has?' filled':isYou?' empty':' empty');
    return h('div',{className:cls,onClick:isYou?onVote:undefined},
      h('div',{className:'n'},has?val:(isYou?'+':'·')),
      h('div',{className:'who'},USERS[uk].name)); };
  return h('div',{className:'fitem'},
    h('div',{className:'finfo'},
      h('div',{className:'fname'},f.name,f.novo&&h('span',{className:'fbadge'},'novo')),
      h('div',{className:'fcat'},f.cat)),
    h('div',{className:'scores'},sq('rui'),sq('rita'))
  );
}

function VoteSheet({f,me,onClose,onVote}){
  const [val,setVal]=useState(f.votes?.[me]?.val ?? 7);
  const other=me==='rui'?'rita':'rui',ov=f.votes?.[other]?.val;
  return h('div',{className:'backdrop',onClick:onClose},
    h('div',{className:'sheet',onClick:e=>e.stopPropagation()},
      h('div',{className:'grab'}),
      h('h3',null,f.name),
      h('p',{className:'muted',style:{marginTop:0}},
        ov!=null?`${USERS[other].name} deu ${ov}`:`${USERS[other].name} ainda não provou`),
      h('div',{className:'bignum',style:{color:'var(--accent)'}},val),
      h('input',{type:'range',min:0,max:10,step:1,value:val,onChange:e=>setVal(+e.target.value),
        style:{marginTop:10}}),
      h('div',{style:{display:'flex',justifyContent:'space-between'},className:'muted'},
        h('span',null,'0'),h('span',null,'a tua nota'),h('span',null,'10')),
      h('button',{className:'btn',style:{marginTop:18},onClick:()=>{onVote(f.id,val);onClose()}},
        'Guardar nota'),
      h('button',{className:'btn plain',style:{marginTop:8},onClick:onClose},'Cancelar')
    ));
}

/* ---------- MONTAGEM ---------- */
function Video({days,posts}){
  const [playing,setPlaying]=useState(false),[idx,setIdx]=useState(0);
  const all=[];
  days.forEach(d=>d.stops.forEach(s=>(s.photos||[]).forEach(p=>
    all.push({url:p.url,cap:p.cap||s.name,place:s.name,day:d.date,ts:p.ts}))));
  posts.forEach(p=>all.push({url:p.url,cap:p.caption,place:p.caption||'Momento',
    day:new Date(p.ts).toLocaleDateString('pt-PT',{day:'2-digit',month:'short'}),ts:p.ts}));
  all.sort((a,b)=>(a.ts||0)-(b.ts||0));
  useEffect(()=>{if(!playing||!all.length)return;
    const t=setInterval(()=>setIdx(i=>(i+1)%all.length),1500);return ()=>clearInterval(t)},[playing,all.length]);
  return h('div',{className:'scr'},
    all.length===0
      ? h('div',{className:'empty'},h(Icon,{d:ICONS.play,size:38}),
          h('div',null,'Adiciona fotos no itinerário ou no diário para criar a montagem.'))
      : h('div',null,
          h('div',{className:'section-title'},all.length+' fotos · ordem cronológica'),
          h('div',{className:'cinema'},
            h('img',{key:idx,src:all[idx].url}),
            h('div',{className:'ov'},h('div',{className:'pl'},all[idx].cap),
              h('div',{className:'dy'},all[idx].day))),
          h('div',{className:'foot-actions',style:{padding:'12px 0 0'}},
            h('button',{className:'btn',style:{flex:1},onClick:()=>setPlaying(p=>!p)},
              playing?'Pausa':'Reproduzir'),
            h('button',{className:'btn plain sm',onClick:()=>setIdx(i=>(i+1)%all.length)},'Seguinte')),
          h('div',{className:'muted center',style:{marginTop:8}},(idx+1)+' / '+all.length),
          h('div',{className:'strip'},
            all.map((p,i)=>h('img',{key:i,src:p.url,className:i===idx?'cur':'',onClick:()=>setIdx(i)}))),
          h('div',{className:'muted center',style:{marginTop:14,padding:'0 24px'}},
            'Para guardar como vídeo, usa a gravação de ecrã do telemóvel durante a reprodução.'))
  );
}

/* ---------- TAB BAR ---------- */
function TabBar({tab,setTab}){
  const items=[['plano','Itinerário',ICONS.list],['feed','Diário',ICONS.image],
    ['comida','Sabores',ICONS.cup],['video','Montagem',ICONS.play]];
  return h('div',{className:'tabbar'},items.map(([k,l,d])=>
    h('button',{key:k,className:'tabbtn'+(tab===k?' on':''),onClick:()=>setTab(k)},
      h(Icon,{d,size:24}),h('span',null,l))));
}

  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
